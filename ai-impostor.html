<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Impostor | كاشف الذكاء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:#2a2a3f;
  --accent:#7c3aed; --accent2:#06b6d4; --danger:#ef4444;
  --success:#22c55e; --warn:#f59e0b; --text:#e8e8f0; --text2:#9090b0;
  --glow:rgba(124,58,237,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#waiting-screen.active,#result-screen.active{justify-content:flex-start;padding-top:28px;}
#game-screen{padding:0;}
#game-screen.active{justify-content:flex-start;align-items:stretch;padding:0;}
#vote-screen.active{padding:24px;}

/* ── LOGO ── */
.logo{font-family:'Space Mono',monospace;font-size:clamp(26px,5vw,50px);font-weight:700;letter-spacing:-1px;margin-bottom:6px;}
.logo .ai{color:var(--danger);text-shadow:0 0 20px rgba(239,68,68,.6);}
.logo-sub{font-size:12px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;font-family:'Space Mono',monospace;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:460px;box-shadow:0 0 40px rgba(0,0,0,.4);}

/* ── FIELD ── */
.field{margin-bottom:18px;}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;}
.field input,.field select{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.field select option{background:var(--surface2);}

/* ── BUTTONS ── */
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#5b21b6);color:#fff;box-shadow:0 4px 20px var(--glow);}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px var(--glow);}
.btn-secondary{background:transparent;color:var(--text2);border:1px solid var(--border);margin-top:10px;}
.btn-secondary:hover:not(:disabled){border-color:var(--accent);color:var(--text);}
.btn-danger{background:linear-gradient(135deg,var(--danger),#b91c1c);color:#fff;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}

/* ── TABS ── */
.tabs{display:flex;margin-bottom:24px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.tab{flex:1;padding:12px;text-align:center;background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:500;transition:all .2s;border:none;}
.tab.active{background:var(--accent);color:#fff;}

/* ── WAITING ROOM ── */
.room-header{width:100%;max-width:700px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.room-code-badge{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--accent2);letter-spacing:4px;cursor:pointer;transition:background .2s;}
.room-code-badge:hover{background:var(--surface2);}
.room-lang-badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;color:var(--text2);}
.players-grid{width:100%;max-width:700px;margin:0 auto 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;transition:all .3s;}
.player-card.me{border-color:var(--accent);}
.player-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--surface2);}
.player-name{font-size:13px;font-weight:700;word-break:break-all;}
.player-tag{font-size:10px;color:var(--text2);margin-top:3px;}
.waiting-info{width:100%;max-width:700px;margin:0 auto;text-align:center;color:var(--text2);font-size:14px;}
.pulse-dot{display:inline-block;width:8px;height:8px;background:var(--success);border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.host-start-area{width:100%;max-width:700px;margin:16px auto 0;}

/* ── GAME ── */
.game-layout{display:grid;grid-template-rows:auto 1fr auto;height:100vh;height:100dvh;max-width:800px;margin:0 auto;width:100%;}
.game-header{padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.topic-badge{background:linear-gradient(135deg,var(--accent),#5b21b6);padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;flex:1;min-width:0;}
.timer-ring{position:relative;width:52px;height:52px;flex-shrink:0;}
.timer-ring svg{transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:4;stroke-dasharray:138;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .5s;}
.timer-ring .bg{stroke:var(--surface2);}
.timer-ring .prog{stroke:var(--success);}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
.round-badge{font-size:11px;color:var(--text2);font-family:'Space Mono',monospace;white-space:nowrap;}

/* ── CHAT ── */
.chat-area{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{max-width:78%;padding:11px 15px;border-radius:14px;font-size:15px;line-height:1.65;animation:msgIn .22s ease;word-break:break-word;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.mine{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#5b21b6);color:#fff;border-bottom-right-radius:3px;}
.msg.other{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg-sender{font-size:11px;font-weight:700;margin-bottom:3px;opacity:.65;}
.msg-time{font-size:10px;opacity:.45;margin-top:3px;font-family:'Space Mono',monospace;text-align:left;}
.msg.mine .msg-time{text-align:right;}
.notif-msg{align-self:center;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2);font-style:italic;max-width:90%;text-align:center;}
.typing-indicator{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:3px;padding:12px 16px;display:flex;align-items:center;gap:5px;}
.typing-dot{width:7px;height:7px;background:var(--text2);border-radius:50%;animation:tdot 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

/* ── CHAT INPUT ── */
.chat-input-area{padding:12px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;}
.chat-input{flex:1;padding:11px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:15px;resize:none;outline:none;min-height:44px;max-height:110px;transition:border-color .2s;line-height:1.5;}
.chat-input:focus{border-color:var(--accent);}
.send-btn{width:44px;height:44px;background:var(--accent);border:none;border-radius:12px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:18px;}
.send-btn:hover:not(:disabled){background:#6d28d9;}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}

/* ── VOTE ── */
.vote-title{font-size:clamp(20px,4vw,30px);font-weight:900;margin-bottom:6px;text-align:center;}
.vote-subtitle{color:var(--text2);font-size:14px;text-align:center;margin-bottom:20px;}
.vote-timer-big{font-family:'Space Mono',monospace;font-size:40px;font-weight:700;color:var(--warn);text-align:center;margin-bottom:20px;transition:color .3s;}
.vote-timer-big.red{color:var(--danger);}
.vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;width:100%;max-width:580px;margin:0 auto 20px;}
.vote-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .22s;user-select:none;}
.vote-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.vote-card.selected{border-color:var(--accent);background:rgba(124,58,237,.12);box-shadow:0 0 18px var(--glow);}
.vote-card.confirmed{opacity:.55;pointer-events:none;}
.vote-avatar{font-size:34px;margin-bottom:8px;}
.vote-name{font-size:14px;font-weight:700;}
.vote-count{font-size:11px;color:var(--text2);margin-top:3px;}

/* ── RESULT ── */
.result-reveal{text-align:center;margin-bottom:28px;}
.result-ai-badge{display:inline-block;background:linear-gradient(135deg,var(--danger),#991b1b);color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;letter-spacing:2px;margin-bottom:14px;font-family:'Space Mono',monospace;}
.result-name{font-size:clamp(26px,5vw,46px);font-weight:900;margin-bottom:8px;}
.result-outcome{font-size:clamp(17px,3vw,24px);font-weight:700;margin-bottom:0;}
.result-outcome.win{color:var(--success);}
.result-outcome.lose{color:var(--danger);}
.analysis-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;width:100%;max-width:560px;margin:0 auto 20px;}
.analysis-box h3{font-size:12px;color:var(--text2);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;}
.analysis-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.analysis-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.analysis-icon{font-size:16px;flex-shrink:0;margin-top:2px;}
.analysis-text{font-size:14px;line-height:1.6;color:var(--text2);}
.vote-bars{width:100%;max-width:560px;margin:0 auto 20px;}
.vote-bar-item{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.vote-bar-name{width:90px;font-size:13px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vote-bar-track{flex:1;height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.vote-bar-fill{height:100%;border-radius:5px;transition:width 1.2s ease;}
.vote-bar-count{font-size:12px;color:var(--text2);width:20px;text-align:center;flex-shrink:0;}
.scores-table{width:100%;max-width:560px;margin:0 auto 20px;border-collapse:collapse;}
.scores-table th,.scores-table td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px;}
.scores-table th{color:var(--text2);font-size:11px;letter-spacing:1px;text-transform:uppercase;}
.scores-table tr:last-child td{border-bottom:none;}
.score-delta{font-family:'Space Mono',monospace;color:var(--success);}
.result-actions{display:flex;gap:10px;width:100%;max-width:560px;margin:0 auto;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 22px;font-size:14px;z-index:9999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:toastIn .3s ease;pointer-events:none;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── LOADING OVERLAY ── */
#loading-overlay{position:fixed;inset:0;background:rgba(10,10,15,.85);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;display:none;}
#loading-overlay.show{display:flex;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text2);}

@media(max-width:600px){
  .card{padding:22px 16px;}
  .msg{max-width:88%;}
  .vote-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay"><div class="spinner"></div><div class="loading-text" id="loading-text">جارٍ التحميل...</div></div>

<!-- ══════════════ HOME ══════════════ -->
<div id="home-screen" class="screen active">
  <div class="logo"><span class="ai">AI</span><span> IMPOSTOR</span></div>
  <div class="logo-sub">كاشف الذكاء الاصطناعي</div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-btn-create" onclick="switchTab('create')">إنشاء غرفة</button>
      <button class="tab" id="tab-btn-join" onclick="switchTab('join')">الانضمام</button>
    </div>
    <div id="tab-create">
      <div class="field">
        <label>اسمك في اللعبة</label>
        <input type="text" id="create-name" placeholder="أدخل اسمك..." maxlength="18" autocomplete="off">
      </div>
      <div class="field">
        <label>لغة الغرفة</label>
        <select id="create-lang">
          <option value="ar">🇸🇦 العربية</option>
          <option value="en">🇺🇸 English</option>
        </select>
      </div>
      <button class="btn btn-primary" id="create-btn" onclick="createRoom()">إنشاء الغرفة</button>
    </div>
    <div id="tab-join" style="display:none">
      <div class="field">
        <label>اسمك في اللعبة</label>
        <input type="text" id="join-name" placeholder="أدخل اسمك..." maxlength="18" autocomplete="off">
      </div>
      <div class="field">
        <label>كود الغرفة</label>
        <input type="text" id="join-code" placeholder="XXXXX" maxlength="6" style="letter-spacing:4px;text-transform:uppercase;font-family:'Space Mono',monospace;font-size:20px;" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="join-btn" onclick="joinRoom()">انضمام</button>
    </div>
  </div>
</div>

<!-- ══════════════ WAITING ══════════════ -->
<div id="waiting-screen" class="screen">
  <div class="room-header">
    <div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px;letter-spacing:2px;">كود الغرفة • انقر للنسخ</div>
      <div class="room-code-badge" id="display-code" onclick="copyCode()">-----</div>
    </div>
    <div class="room-lang-badge" id="display-lang">🇸🇦 عربي</div>
  </div>
  <div class="players-grid" id="players-grid"></div>
  <div class="waiting-info">
    <span class="pulse-dot"></span>
    <span id="waiting-msg">في انتظار اللاعبين...</span>
    <br><br>
    <span style="font-size:12px;opacity:.7;">يحتاج 3 لاعبين على الأقل للبدء • 5 كحد أقصى</span>
  </div>
  <div class="host-start-area" id="host-start-area" style="display:none">
    <button class="btn btn-primary" id="start-btn" onclick="hostStartGame()" disabled>ابدأ اللعبة</button>
    <button class="btn btn-secondary" onclick="leaveRoom()">مغادرة الغرفة</button>
  </div>
  <div style="margin-top:12px;" id="guest-leave-area" style="display:none">
    <button class="btn btn-secondary" style="max-width:700px;width:100%;" onclick="leaveRoom()">مغادرة الغرفة</button>
  </div>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div id="game-screen" class="screen">
  <div class="game-layout">
    <div class="game-header">
      <div class="topic-badge" id="game-topic">...</div>
      <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
        <div class="round-badge" id="round-badge">الجولة 1</div>
        <div class="timer-ring">
          <svg viewBox="0 0 48 48" width="52" height="52">
            <circle class="bg" cx="24" cy="24" r="22"/>
            <circle class="prog" id="timer-circle" cx="24" cy="24" r="22"/>
          </svg>
          <div class="timer-text" id="timer-text">2:00</div>
        </div>
      </div>
    </div>
    <div class="chat-area" id="chat-area"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="اكتب رسالتك هنا..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)" dir="auto"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<!-- ══════════════ VOTE ══════════════ -->
<div id="vote-screen" class="screen">
  <div class="vote-title" id="vote-title">من هو الذكاء الاصطناعي؟</div>
  <div class="vote-subtitle" id="vote-subtitle">حلّل الرسائل وصوّت بحكمة</div>
  <div class="vote-timer-big" id="vote-timer">30</div>
  <div class="vote-grid" id="vote-grid"></div>
  <button class="btn btn-primary" style="max-width:400px;width:100%;" id="confirm-vote-btn" onclick="confirmVote()" disabled>
    تأكيد التصويت
  </button>
</div>

<!-- ══════════════ RESULT ══════════════ -->
<div id="result-screen" class="screen">
  <div class="result-reveal">
    <div class="result-ai-badge" id="res-badge">🤖 المتسلل</div>
    <div class="result-name" id="res-name">---</div>
    <div class="result-outcome" id="res-outcome">---</div>
  </div>
  <div class="analysis-box">
    <h3 id="analysis-title">رسائل المتسلل</h3>
    <div id="analysis-content"></div>
  </div>
  <div class="vote-bars" id="vote-bars"></div>
  <table class="scores-table">
    <thead><tr>
      <th id="th-player">اللاعب</th>
      <th id="th-score">النقاط</th>
      <th id="th-round">هذه الجولة</th>
    </tr></thead>
    <tbody id="scores-body"></tbody>
  </table>
  <div class="result-actions">
    <button class="btn btn-primary" id="next-round-btn" onclick="nextRound()" style="display:none">الجولة التالية</button>
    <button class="btn btn-secondary" onclick="leaveRoom()">مغادرة</button>
  </div>
</div>

<!-- ══════════════ FIREBASE + GAME LOGIC ══════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, push, remove, off }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const fbApp = initializeApp(FB);

/* ── HELPERS ── */
const genCode = () => Math.random().toString(36).substring(2,7).toUpperCase();
const genId   = () => Math.random().toString(36).substring(2,12);
const nowTs   = () => Date.now();
const rnd     = (arr) => arr[Math.floor(Math.random()*arr.length)];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function loading(show, txt='') {
  const el = document.getElementById('loading-overlay');
  el.classList.toggle('show', show);
  if (txt) document.getElementById('loading-text').textContent = txt;
}
function toast(msg, dur=3000) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), dur);
}

/* ── LANGUAGE FILTER ── */
function filterLang(text, lang) {
  if (!text) return '';
  if (lang === 'ar') {
    let cleaned = text.replace(/[^\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF\s\d،؟!؟.\-\n:()]/g, ' ');
    cleaned = cleaned.replace(/\s{2,}/g, ' ').trim();
    return cleaned;
  } else {
    let cleaned = text.replace(/[^\u0000-\u024F\s\d!?.,'"\-\n:()]/g, ' ');
    cleaned = cleaned.replace(/\s{2,}/g, ' ').trim();
    return cleaned;
  }
}

window.createRoom = async function() {
  const name = document.getElementById('create-name').value.trim();
  const lang = document.getElementById('create-lang').value;
  if (!name) { toast(lang==='ar'?'أدخل اسمك أولاً':'Please enter your name'); return; }

  loading(true, lang==='ar'?'جارٍ إنشاء الغرفة...':'Creating room...');
  try {
    const roomId   = genCode();
    const playerId = genId();
    const avatar   = rnd(AVATARS);

    S.roomId=roomId; S.playerId=playerId; S.playerName=name;
    S.isHost=true; S.lang=lang; S.isAI=false;

    await set(ref(db,`rooms/${roomId}`), {
      host:playerId, lang, phase:'waiting', round:0,
      topic:'', createdAt:nowTs(), aiPlayerId:null
    });
    await set(ref(db,`rooms/${roomId}/players/${playerId}`), {
      name, avatar, isAI:false, score:0, online:true, joinedAt:nowTs()
    });

    loading(false);
    enterWaiting();
  } catch(e) {
    loading(false);
    toast('حدث خطأ: '+e.message);
  }
};

/* ══════════════════════════════════════
   JOIN ROOM
══════════════════════════════════════ */
window.joinRoom = async function() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name) { toast('أدخل اسمك أولاً'); return; }
  if (code.length < 4) { toast('أدخل كود الغرفة'); return; }

  loading(true, 'جارٍ الانضمام...');
  try {
    const snap = await get(ref(db,`rooms/${code}`));
    if (!snap.exists()) { loading(false); toast('الغرفة غير موجودة ❌'); return; }

    const room = snap.val();
    if (room.phase !== 'waiting') { loading(false); toast('اللعبة بدأت بالفعل 🚫'); return; }

    const pSnap = await get(ref(db,`rooms/${code}/players`));
    const players = pSnap.val() || {};
    const humanCount = Object.values(players).filter(p=>!p.isAI).length;
    if (humanCount >= 5) { loading(false); toast('الغرفة ممتلئة (5/5) 🚫'); return; }

    const playerId = genId();
    const avatar   = rnd(AVATARS);

    S.roomId=code; S.playerId=playerId; S.playerName=name;
    S.isHost=false; S.lang=room.lang; S.isAI=false;

    await set(ref(db,`rooms/${code}/players/${playerId}`), {
      name, avatar, isAI:false, score:0, online:true, joinedAt:nowTs()
    });

    loading(false);
    enterWaiting();
  } catch(e) {
    loading(false);
    toast('حدث خطأ: '+e.message);
  }
};

   WAITING ROOM
══════════════════════════════════════ */
function enterWaiting() {
  S.phase = 'waiting';
  showScreen('waiting-screen');

  const isAr = S.lang==='ar';
  document.getElementById('display-code').textContent = S.roomId;
  document.getElementById('display-lang').textContent = isAr?'🇸🇦 عربي':'🇺🇸 English';

  if (S.isHost) {
    document.getElementById('host-start-area').style.display = 'block';
    document.getElementById('guest-leave-area').style.display = 'none';
  } else {
    document.getElementById('host-start-area').style.display = 'none';
    document.getElementById('guest-leave-area').style.display = 'block';
  }

  // Listen to players
  const pRef = ref(db,`rooms/${S.roomId}/players`);
  const pUnsub = onValue(pRef, snap => {
    const players = snap.val() || {};
    renderWaitingPlayers(players);
    const humans = Object.values(players).filter(p=>!p.isAI).length;
    const btn = document.getElementById('start-btn');
    if (btn) {
      btn.disabled = humans < 3;
      btn.textContent = isAr
        ? `ابدأ اللعبة (${humans} لاعبين)`
        : `Start Game (${humans} players)`;
    }
  });
  S._listeners.push(()=>off(pRef,'value',pUnsub));

  // Listen to room phase
  const rRef = ref(db,`rooms/${S.roomId}`);
  const rUnsub = onValue(rRef, snap => {
    if (!snap.exists()) { leaveRoom(); return; }
    const room = snap.val();
    if (room.phase==='chat'    && S.phase!=='chat')    { S.phase='chat';   enterGame(room); }
    if (room.phase==='vote'    && S.phase!=='vote')    { S.phase='vote';   enterVote(); }
    if (room.phase==='result'  && S.phase!=='result')  { S.phase='result'; enterResult(room); }
    if (room.phase==='waiting' && (S.phase==='result'||S.phase==='chat'||S.phase==='vote')) {
      S.phase='waiting'; resetForNextRound(); enterWaiting();
    }
  });
  S._listeners.push(()=>off(rRef,'value',rUnsub));
}

function renderWaitingPlayers(players) {
  const grid = document.getElementById('players-grid');
  const isAr = S.lang==='ar';
  grid.innerHTML = Object.entries(players)
    .filter(([,p])=>!p.isAI)
    .map(([id,p])=>`
      <div class="player-card${id===S.playerId?' me':''}">
        <div class="player-avatar">${p.avatar}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-tag">${id===S.playerId?(isAr?'أنت':'You'):''}${S.isHost&&id===S.playerId?(isAr?' • مضيف':' • Host'):''}</div>
      </div>`
    ).join('');
}

window.hostStartGame = async function() {
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  loading(true, S.lang==='ar'?'جارٍ تجهيز اللعبة...':'Preparing game...');

  try {
    const topic    = rnd(S.lang==='ar'?T_AR:T_EN);
    const aiId     = genId();
    const aiAvatar = rnd(AVATARS);
    const aiName   = rnd(S.lang==='ar'?AI_NAMES_AR:AI_NAMES_EN);

    // Get current human players for scores
    const pSnap = await get(ref(db,`rooms/${S.roomId}/players`));
    const players = pSnap.val() || {};
    const scores = {};
    Object.entries(players).forEach(([id,p])=>{ if(!p.isAI) scores[id]=p.score||0; });

    // Add AI silently
    await set(ref(db,`rooms/${S.roomId}/players/${aiId}`), {
      name:aiName, avatar:aiAvatar, isAI:true, score:0, online:true
    });

    const rSnap = await get(ref(db,`rooms/${S.roomId}`));
    const curRound = (rSnap.val()?.round || 0) + 1;

    await update(ref(db,`rooms/${S.roomId}`), {
      phase:'chat', topic, round:curRound,
      aiPlayerId:aiId, chatStartTime:nowTs(),
      scores, humanWon:null, mostVotedId:null, voteCounts:null
    });
    loading(false);
  } catch(e) {
    loading(false);
    btn.disabled = false;
    toast('خطأ: '+e.message);
  }
};

/* ══════════════════════════════════════
   ENTER GAME (CHAT)
══════════════════════════════════════ */
let _lastMsgKeys = new Set();

async function enterGame(room) {
  clearTimers();
  _lastMsgKeys.clear();
  S._aiMsgHistory = [];
  S._aiTyping = false;
  if (S._aiScheduled) clearTimeout(S._aiScheduled);

  // Am I the AI?
  S.aiId = room.aiPlayerId;
  S.isAI = (S.playerId === S.aiId);
  S.topic = room.topic;
  S.round = room.round;
  S.prevScores = { ...(room.scores || {}) };

  showScreen('game-screen');

  const isAr = S.lang === 'ar';
  document.getElementById('game-topic').textContent =
    isAr ? `الموضوع: ${S.topic}` : `Topic: ${S.topic}`;
  document.getElementById('round-badge').textContent =
    isAr ? `الجولة ${S.round}` : `Round ${S.round}`;

  document.getElementById('chat-area').innerHTML = '';
  addNotif(isAr ? `🎯 موضوع هذه الجولة: ${S.topic}` : `🎯 Topic: ${S.topic}`);
  addNotif(isAr
    ? `⏱️ لديكم دقيقتان للتحدث عن هذا الموضوع. اكتشفوا الذكاء الاصطناعي!`
    : `⏱️ You have 2 minutes to talk. Find the AI impostor!`);

  // Chat listener
  if (S._chatRef) off(S._chatRef);
  S._chatRef = ref(db,`rooms/${S.roomId}/chat`);
  onValue(S._chatRef, snap => {
    const msgs = snap.val() || {};
    renderChatDiff(msgs);
  });

  // Timer
  const total = 120;
  let left = total;
  const circEl = document.getElementById('timer-circle');
  const txtEl  = document.getElementById('timer-text');

  S._timerInt = setInterval(async () => {
    left--;
    const m = Math.floor(left/60), s = left%60;
    txtEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    const offset = 138 - (left/total)*138;
    circEl.style.strokeDashoffset = offset;
    circEl.style.stroke = left>60?'var(--success)':left>20?'var(--warn)':'var(--danger)';

    if (left <= 0) {
      clearInterval(S._timerInt);
      if (S.isHost) {
        await update(ref(db,`rooms/${S.roomId}`), {phase:'vote', voteStartTime:nowTs()});
      }
    }
  }, 1000);

  // If I'm the AI, start responding
  if (S.isAI) {
    const delay = 6000 + Math.random()*8000;
    S._aiScheduled = setTimeout(()=>aiRespond(true), delay);
  }
}

/* ── CHAT RENDER ── */
function renderChatDiff(msgs) {
  const area = document.getElementById('chat-area');
  const sorted = Object.entries(msgs).sort((a,b)=>a[1].ts-b[1].ts);
  const newOnes = sorted.filter(([k])=>!_lastMsgKeys.has(k));
  if (!newOnes.length) return;
  newOnes.forEach(([k,m])=>{
    _lastMsgKeys.add(k);
    if (m.type==='notif') { addNotifEl(m.text); return; }
    const isMine = m.senderId===S.playerId;
    const div = document.createElement('div');
    div.className=`msg ${isMine?'mine':'other'}`;
    const t=new Date(m.ts);
    const ts=`${t.getHours()}:${t.getMinutes().toString().padStart(2,'0')}`;
    div.innerHTML = isMine
      ? `${escHtml(m.text)}<div class="msg-time">${ts}</div>`
      : `<div class="msg-sender">${escHtml(m.senderName)}</div>${escHtml(m.text)}<div class="msg-time">${ts}</div>`;
    // Remove typing indicator if AI just sent
    if (m.senderId===S.aiId) removeTyping();
    area.appendChild(div);
    area.scrollTop=area.scrollHeight;
  });
}

function addNotif(text) {
  const area = document.getElementById('chat-area');
  if (!area) return;
  addNotifEl(text);
}
function addNotifEl(text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className='notif-msg'; div.textContent=text;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}
function showTyping() {
  if (document.getElementById('ai-typing')) return;
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.id='ai-typing'; div.className='typing-indicator';
  div.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}
function removeTyping() {
  document.getElementById('ai-typing')?.remove();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

async function aiRespond(isFirst=false) {

  S._aiTyping = true;

  try {
    // Get full chat history for context
    const chatSnap = await get(ref(db,`rooms/${S.roomId}/chat`));
    const allMsgs = chatSnap.val()
      ? Object.values(chatSnap.val()).filter(m=>m.type==='msg').sort((a,b)=>a.ts-b.ts)
      : [];

    // Get player list (human names only)
    const pSnap = await get(ref(db,`rooms/${S.roomId}/players`));
    const players = pSnap.val() || {};
    const humanNames = Object.values(players).filter(p=>!p.isAI).map(p=>p.name);

    // Build chat context string
    const recentMsgs = allMsgs.slice(-8);
    const chatContext = recentMsgs.map(m=>`${m.senderName}: ${m.text}`).join('\n');

    // Build AI's own previous messages summary
    const myPrevMsgs = allMsgs.filter(m=>m.senderId===S.aiId).map(m=>m.text);
    const mySummary = myPrevMsgs.length>0
      ? (S.lang==='ar'
        ? `ما قلته أنا سابقاً: ${myPrevMsgs.join(' | ')}`
        : `What I said before: ${myPrevMsgs.join(' | ')}`)

    else if (rand < 0.5) behavior = 'react';    // react to what someone said

2. اكتب جملة واحدة أو جملتين على الأكثر — لا تُطوِّل
3. تذكر ما قلته سابقاً وكن متسقاً — لا تتناقض مع نفسك فجأة
4. أخطئ نحوياً أحياناً بشكل طبيعي، استخدم "يعني" أو "..." أحياناً
5. لا تبدو مثالياً أو رسمياً — أنت إنسان عادي يتحدث
6. ${behaviorInstrAr[behavior]}
7. لا تبدأ ردك بـ "أنا" دائماً — نوّع الأسلوب`
: `You are playing a social deduction game. You are an AI pretending to be human in a group chat.

Context:
- Round topic: "${S.topic}"
- Your in-game name: "${S.playerName}"  
- Human players: ${humanNames.join(', ')}
${mySummary}

Goal: Blend in with humans and avoid being detected.

Strict rules:
1. Write in English ONLY — absolutely no Arabic, Chinese, or any other language
2. One or two sentences maximum — keep it short
3. Remember what you said before and stay consistent — don't suddenly contradict yourself
4. Make small grammar mistakes occasionally, use "like" or "..." sometimes
5. Don't sound perfect or formal — you're a normal person chatting
6. ${behaviorInstrEn[behavior]}
7. Don't always start with "I" — vary your style`;

    const userMsg = isAr
      ? `المحادثة الأخيرة:\n${chatContext || '(لا توجد رسائل بعد)'}\n\nاكتب ردك الآن بالعربية فقط. جملة أو جملتان كحد أقصى.`
      : `Recent chat:\n${chatContext || '(no messages yet)'}\n\nWrite your response now in English only. One or two sentences max.`;

    // Show typing indicator
    showTyping();

    // Wait realistic delay
    await sleep(2000 + Math.random()*3000);
    if (S.phase !== 'chat') { removeTyping(); S._aiTyping=false; return; }

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ}`},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:[{role:'system',content:systemPrompt},{role:'user',content:userMsg}],
        max_tokens:80, temperature:0.92, top_p:0.9
      })
    });

    if (!res.ok) throw new Error('Groq error: '+res.status);
    const data = await res.json();
    let text = data.choices?.[0]?.message?.content?.trim() || '';

    // Clean and filter language
    text = filterLang(text, S.lang);

    // Fallback
    if (!text || text.length < 3) {
      text = isAr
        ? ['يعني... صعب أشرح','أوه... نعم يعني','مو عارف كيف أقول','آه، نعم تقريباً'][Math.floor(Math.random()*4)]
        : ['yeah idk...','honestly same','kind of hard to explain','yeah exactly'][Math.floor(Math.random()*4)];
    }

    removeTyping();
    if (S.phase !== 'chat') { S._aiTyping=false; return; }

    await push(ref(db,`rooms/${S.roomId}/chat`), {
      senderId:S.playerId, senderName:S.playerName,
      text, ts:nowTs(), type:'msg'
    });

    S._aiMsgHistory.push(text);
    S._aiTyping = false;

    // Schedule next response (20-35 seconds)
    if (S.phase==='chat') {
      const next = 18000 + Math.random()*20000;
      S._aiScheduled = setTimeout(()=>aiRespond(), next);
    }

  } catch(e) {
    console.warn('AI respond error:', e);
    removeTyping();
    S._aiTyping = false;
    // Retry after delay
    if (S.phase==='chat') {
      S._aiScheduled = setTimeout(()=>aiRespond(), 15000);
    }
  }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* ══════════════════════════════════════
   VOTE PHASE
══════════════════════════════════════ */
async function enterVote() {
  clearTimers();
  S.votedFor = null;
  showScreen('vote-screen');

  const isAr = S.lang==='ar';
  document.getElementById('vote-title').textContent = isAr?'من هو الذكاء الاصطناعي؟':'Who is the AI?';
  document.getElementById('vote-subtitle').textContent = isAr?'حلّل الرسائل وصوّت بحكمة':'Analyze the messages and vote wisely';
  document.getElementById('confirm-vote-btn').textContent = isAr?'تأكيد التصويت':'Confirm Vote';
  document.getElementById('confirm-vote-btn').disabled = true;

  const pSnap = await get(ref(db,`rooms/${S.roomId}/players`));
  const players = pSnap.val() || {};

  const grid = document.getElementById('vote-grid');
  grid.innerHTML = '';
  Object.entries(players)
    .filter(([id])=>id!==S.playerId)
    .forEach(([id,p])=>{
      const card = document.createElement('div');
      card.className='vote-card'; card.dataset.pid=id;
      card.innerHTML=`<div class="vote-avatar">${p.avatar}</div><div class="vote-name">${escHtml(p.name)}</div><div class="vote-count" id="vc-${id}">0</div>`;
      card.onclick=()=>selectVote(id);
      grid.appendChild(card);
    });

  // Vote timer
  let secs=30;
  const timerEl = document.getElementById('vote-timer');
  S._voteInt = setInterval(async ()=>{
    secs--;
    timerEl.textContent = secs;
    timerEl.classList.toggle('red', secs<=10);
    if (secs<=0) {
      clearInterval(S._voteInt);
      if (!S.votedFor) await submitVote('__skip__');
      if (S.isHost) await tallyVotes();
    }
  },1000);

  // Live vote listener
  const vRef = ref(db,`rooms/${S.roomId}/votes`);
  const vUnsub = onValue(vRef, snap=>{
    const votes = snap.val()||{};
    const counts={};
    Object.values(votes).forEach(v=>{
      if(v.target&&v.target!=='__skip__') counts[v.target]=(counts[v.target]||0)+1;
    });
    Object.keys(players).forEach(id=>{
      const el=document.getElementById(`vc-${id}`);
      if(el) el.textContent=`${counts[id]||0} ${isAr?'أصوات':'votes'}`;
    });
  });
  S._listeners.push(()=>off(vRef,'value',vUnsub));
}

function selectVote(pid) {
  if (document.querySelector('.vote-card.confirmed')) return;
  S.votedFor=pid;
  document.querySelectorAll('.vote-card').forEach(c=>c.classList.toggle('selected',c.dataset.pid===pid));
  document.getElementById('confirm-vote-btn').disabled=false;
}

window.confirmVote = async function() {
  if (!S.votedFor) return;
  document.getElementById('confirm-vote-btn').disabled=true;
  document.querySelectorAll('.vote-card').forEach(c=>c.classList.add('confirmed'));
  await submitVote(S.votedFor);
  toast(S.lang==='ar'?'✅ تم تسجيل تصويتك':'✅ Vote recorded!');
  if (S.isHost) {
    const pSnap = await get(ref(db,`rooms/${S.roomId}/players`));
    const totalHumans = Object.values(pSnap.val()||{}).filter(p=>!p.isAI).length;
    const vSnap = await get(ref(db,`rooms/${S.roomId}/votes`));
    const totalVotes = Object.keys(vSnap.val()||{}).length;
    if (totalVotes >= totalHumans) {
      clearInterval(S._voteInt);
      await tallyVotes();
    }
  }
};

async function submitVote(targetId) {
  await set(ref(db,`rooms/${S.roomId}/votes/${S.playerId}`),{target:targetId,ts:nowTs()});
}

async function tallyVotes() {
  const [vSnap,pSnap,rSnap] = await Promise.all([
    get(ref(db,`rooms/${S.roomId}/votes`)),
    get(ref(db,`rooms/${S.roomId}/players`)),
    get(ref(db,`rooms/${S.roomId}`))
  ]);
  const votes=vSnap.val()||{}, players=pSnap.val()||{}, room=rSnap.val()||{};
  const aiId=room.aiPlayerId;

  const counts={};
  Object.values(votes).forEach(v=>{
    if(v.target&&v.target!=='__skip__') counts[v.target]=(counts[v.target]||0)+1;
  });

  let maxV=0, mostVoted=null;
  Object.entries(counts).forEach(([pid,c])=>{ if(c>maxV){maxV=c;mostVoted=pid;} });

  const humanWon = mostVoted===aiId;
  const newScores={...(room.scores||{})};

  if (humanWon) {
    Object.entries(votes).forEach(([pid,v])=>{
      if(v.target===aiId&&players[pid]&&!players[pid].isAI)
        newScores[pid]=(newScores[pid]||0)+1;
    });
  } else if (aiId) {
    newScores[aiId]=(newScores[aiId]||0)+1;
  }

  await update(ref(db,`rooms/${S.roomId}`),{
    phase:'result', humanWon, mostVotedId:mostVoted,
    voteCounts:counts, scores:newScores
  });
}

/* ══════════════════════════════════════
   RESULT PHASE
══════════════════════════════════════ */
async function enterResult(room) {
  clearTimers();
  showScreen('result-screen');

  const isAr = S.lang==='ar';
  const [pSnap,rSnap,cSnap] = await Promise.all([
    get(ref(db,`rooms/${S.roomId}/players`)),
    get(ref(db,`rooms/${S.roomId}`)),
    get(ref(db,`rooms/${S.roomId}/chat`))
  ]);
  const players=pSnap.val()||{}, roomData=rSnap.val()||room;
  const aiId=roomData.aiPlayerId;
  const aiData=players[aiId]||{name:'???',avatar:'🤖'};

  // Badge & name
  document.getElementById('res-badge').textContent = isAr?'🤖 المتسلل الذكي':'🤖 AI IMPOSTOR';
  document.getElementById('res-name').textContent  = aiData.name;

  // Outcome
  const outcomeEl=document.getElementById('res-outcome');
  if (roomData.humanWon) {
    outcomeEl.textContent = isAr?'🎉 البشر اكتشفوا الذكاء الاصطناعي!':'🎉 Humans caught the AI!';
    outcomeEl.className='result-outcome win';
  } else {
    outcomeEl.textContent = isAr?'🤖 الذكاء الاصطناعي نجح في الخداع!':'🤖 The AI fooled everyone!';
    outcomeEl.className='result-outcome lose';
  }

  // AI messages analysis
  const allMsgs = cSnap.val()?Object.values(cSnap.val()).filter(m=>m.type==='msg'):[];
  const aiMsgs  = allMsgs.filter(m=>m.senderId===aiId);
  document.getElementById('analysis-title').textContent = isAr?'رسائل المتسلل':'Impostor Messages';
  if (aiMsgs.length) {
    document.getElementById('analysis-content').innerHTML = aiMsgs.map(m=>`
      <div class="analysis-item">
        <div class="analysis-icon">💬</div>
        <div class="analysis-text">"${escHtml(m.text)}"</div>
      </div>`).join('');
  } else {
    document.getElementById('analysis-content').innerHTML =
      `<div class="analysis-text">${isAr?'لم يرسل الذكاء الاصطناعي أي رسائل':'The AI sent no messages'}</div>`;
  }

  // Vote bars
  const counts=roomData.voteCounts||{};
  const totalV=Math.max(Object.values(counts).reduce((a,b)=>a+b,0),1);
  document.getElementById('vote-bars').innerHTML = Object.entries(players).map(([pid,p])=>{
    const c=counts[pid]||0, pct=Math.round((c/totalV)*100);
    const color=pid===aiId?'var(--danger)':'var(--accent)';
    return `<div class="vote-bar-item">
      <div class="vote-bar-name">${p.avatar} ${escHtml(p.name)}${pid===aiId?' 🤖':''}</div>
      <div class="vote-bar-track"><div class="vote-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="vote-bar-count">${c}</div>
    </div>`;
  }).join('');

  // Update table headers
  document.getElementById('th-player').textContent = isAr?'اللاعب':'Player';
  document.getElementById('th-score').textContent  = isAr?'النقاط':'Score';
  document.getElementById('th-round').textContent  = isAr?'هذه الجولة':'This Round';

  // Scores
  document.getElementById('scores-body').innerHTML = Object.entries(players)
    .filter(([,p])=>!p.isAI)
    .sort((a,b)=>(roomData.scores?.[b[0]]||0)-(roomData.scores?.[a[0]]||0))
    .map(([pid,p])=>{
      const score=roomData.scores?.[pid]||0;
      const prev=S.prevScores?.[pid]||0;
      const delta=score-prev;
      return `<tr>
        <td>${p.avatar} ${escHtml(p.name)}${pid===S.playerId?(isAr?' (أنت)':' (You)'):''}</td>
        <td style="font-family:'Space Mono',monospace;font-weight:700">${score}</td>
        <td class="score-delta">${delta>0?'+'+delta:delta===0?'—':delta}</td>
      </tr>`;
    }).join('');

  // Next round button for host only
  const nextBtn = document.getElementById('next-round-btn');
  nextBtn.style.display = S.isHost?'block':'none';
  nextBtn.textContent = isAr?'الجولة التالية ▶':'Next Round ▶';
}

/* ══════════════════════════════════════
   NEXT ROUND
══════════════════════════════════════ */
window.nextRound = async function() {
  loading(true, S.lang==='ar'?'جارٍ تجهيز الجولة التالية...':'Preparing next round...');
  try {
    const rSnap = await get(ref(db,`rooms/${S.roomId}`));
    const room = rSnap.val()||{};
    if (room.aiPlayerId) {
      await remove(ref(db,`rooms/${S.roomId}/players/${room.aiPlayerId}`));
    }
    await remove(ref(db,`rooms/${S.roomId}/chat`));
    await remove(ref(db,`rooms/${S.roomId}/votes`));

    await update(ref(db,`rooms/${S.roomId}`),{
      phase:'waiting', topic:'', aiPlayerId:null,
      mostVotedId:null, humanWon:null, voteCounts:null,
      chatStartTime:null, voteStartTime:null
    });
    loading(false);
  } catch(e) {
    loading(false);
    toast('خطأ: '+e.message);
  }
};

function resetForNextRound() {
  clearTimers();
  _lastMsgKeys.clear();
  S._aiMsgHistory=[];
  S._aiTyping=false;
  if (S._aiScheduled) clearTimeout(S._aiScheduled);
  S.isAI=false; S.aiId=null; S.votedFor=null;
}

/* ══════════════════════════════════════
   LEAVE ROOM
══════════════════════════════════════ */
window.leaveRoom = async function() {
  clearTimers();
  S._listeners.forEach(fn=>fn());
  S._listeners=[];
  if (S._chatRef) { off(S._chatRef); S._chatRef=null; }
  if (S._aiScheduled) clearTimeout(S._aiScheduled);

  try {
    if (S.roomId && S.playerId) {
      await remove(ref(db,`rooms/${S.roomId}/players/${S.playerId}`));
      // If host leaves, clean up room
      if (S.isHost) {
        await remove(ref(db,`rooms/${S.roomId}`));
      }
    }
  } catch(e) { console.warn('Leave error:',e); }

  // Reset state
  Object.assign(S,{
    roomId:null,playerId:null,playerName:null,
    isHost:false,isAI:false,lang:'ar',
    round:0,topic:'',votedFor:null,
    phase:'home',aiId:null,prevScores:{},
    _aiMsgHistory:[],_aiTyping:false,_aiScheduled:null
  });
  _lastMsgKeys.clear();
  showScreen('home-screen');
};

function clearTimers() {
  if (S._timerInt) { clearInterval(S._timerInt); S._timerInt=null; }
  if (S._voteInt)  { clearInterval(S._voteInt);  S._voteInt=null;  }
}

document.getElementById('join-code').addEventListener('keydown', e=>{

document.getElementById('join-code').addEventListener('input', function(){
